# docker-compose.dev.yml — fixtures for local development.
#
# Bring up with:
#   docker compose -f deploy/docker/docker-compose.dev.yml up -d
# Then connect to:
#   MySQL      localhost:3306 (root / rootpw)  database: egmcp_test
#   PostgreSQL localhost:5432 (egmcp / egmcp)  database: egmcp_test
#
# Both are intentionally insecure — only for dev.

services:
  mysql:
    image: mysql:8.0
    container_name: egmcp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: egmcp_test
      MYSQL_USER: egmcp
      MYSQL_PASSWORD: egmcp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: egmcp-postgres
    environment:
      POSTGRES_USER: egmcp
      POSTGRES_PASSWORD: egmcp
      POSTGRES_DB: egmcp_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egmcp"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: egmcp-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
